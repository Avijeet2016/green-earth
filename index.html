<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Earth</title>
    <!-- tailwind & daisyui  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <h1 class="text-4xl font-bold text-center text-green-500 my-5">
      Choose your Trees
    </h1>
    <main class="w-11/12 mx-auto">
      <div class="grid grid-cols-12 gap-5">
        <!-- category section  -->
        <div
          class="col-span-3 card card-body h-fit bg-gray-100 rounded-lg sticky top-8"
        >
          <h1 class="text-3xl text-center font-bold">Categories</h1>
          <div id="categories-container" class="space-y-3">
            <button class="btn btn-primary w-full" id="all-trees-btn">
              All Trees
            </button>
            <!-- categories button will be added here dynamically -->
          </div>
        </div>
        <!-- trees section  -->
        <div class="col-span-6 card card-body h-fit bg-gray-100 rounded-lg">
          <!-- spinner  -->
          <div class="flex justify-center items-center hidden" id="spinner">
            <span class="loading loading-spinner loading-xl"></span>
          </div>
          <div id="trees-container" class="grid grid-cols-3 gap-2">
            <!-- trees will be added here  -->
          </div>
        </div>
         <!-- cart section  -->
        <div class="col-span-3 card card-body min-h-60 h-fit bg-gray-100 rounded-lg">
          <h1 class="text-3xl text-center font-bold">Cart</h1>
          <div id="cart-container" class="space-y-2">
            <!-- cart items will be added here dynamically -->
          </div>
          <div id="empty-cart-message" class="space-y-2 text-center mb-10"> 
            <h3 class="text-xl">Cart is empty!</h3>
            <p>You can add trees to Cart</p>
          </div>
          <div class="bg-green-100 flex justify-between items-center p-2 rounded-lg">
                <h3 class="text-xl font-bold">Total:</h3>
                <h3 id="total-price" class="font-bold text-xl">0</h3>
             </div>
        </div>
      </div>
      <!-- Modal Section  -->
      <section>
        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
          <div class="modal-box">
            <div id="tree-details" class="space-y-2">
              <!-- <h3 class="text-lg font-bold">Hello!</h3>
              <p class="py-4">Press ESC key or click the button below to close</p> -->
            </div>
            
            <div class="modal-action">
              <form method="dialog">
                <!-- if there is a button in form, it will close the modal -->
                <button class="btn">Close</button>
              </form>
            </div>
          </div>
        </dialog>
      </section>
    </main>
    <!-- script integration  -->
    <script src="./scripts/script.js"></script>
  </body>
</html>
